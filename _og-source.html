<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:#1A1612;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(255,255,255,.02) 27px,rgba(255,255,255,.02) 28px);
    font-family:'Inter',sans-serif;position:relative;
  }
  .glow{position:absolute;top:-180px;right:-120px;width:640px;height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(14,116,144,.28) 0%,transparent 70%);}
  .bottomline{position:absolute;bottom:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,transparent,rgba(14,116,144,.9) 40%,transparent);}
  .pad{position:relative;padding:72px 80px;height:100%;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:baseline;gap:14px}
  .brand{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:600;color:#fff;letter-spacing:-.01em}
  .sep{color:rgba(255,255,255,.25);font-family:'JetBrains Mono',monospace;font-size:20px}
  .by{font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.4)}
  .eyebrow{display:flex;align-items:center;gap:14px;margin-bottom:26px}
  .ebar{width:36px;height:2px;background:#0E7490}
  .etext{font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.2em;text-transform:uppercase;color:#0E7490}
  h1{font-family:'Newsreader',serif;font-style:italic;font-weight:400;font-size:78px;line-height:1.05;letter-spacing:-.03em;color:#fff;max-width:920px}
  h1 em{color:#3BA4C0;font-style:italic}
  .sub{margin-top:28px;font-size:23px;line-height:1.5;color:rgba(255,255,255,.62);max-width:880px}
  .foot{display:flex;align-items:center;gap:28px}
  .chip{display:flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:16px;letter-spacing:.04em;color:rgba(255,255,255,.7)}
  .dot{width:8px;height:8px;border-radius:50%;background:#25D366}
  .chip.teal .dot{background:#0E7490}
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="pad">
    <div class="top">
      <span class="brand">Libra</span>
      <span class="sep">/</span>
      <span class="by">Veridiam S.A.S.</span>
    </div>
    <div>
      <div class="eyebrow"><div class="ebar"></div><span class="etext">Orientación jurídica · Colombia</span></div>
      <h1>Tu deuda o comparendo<br>puede haber <em>prescrito</em></h1>
      <p class="sub">Verificamos si tu comparendo, predial, deuda bancaria o reporte en Datacrédito ya superó el término legal de prescripción.</p>
    </div>
    <div class="foot">
      <span class="chip"><span class="dot"></span>Diagnóstico gratuito por WhatsApp</span>
      <span class="chip teal"><span class="dot"></span>Respuesta en menos de 24 h</span>
    </div>
  </div>
  <div class="bottomline"></div>
</body>
</html>
